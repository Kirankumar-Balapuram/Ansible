- name: Variables from args
  hosts: local
  connection: local
  vars:
    name: "Ansiblefrom Play"
  vars_files:  
  - course.yaml 
  vars_prompt:
  - name: NAME
    prompt: please enter name
    private: false
  tasks:
  - name: print name
    vars:
      NAME: "Ansible from TASK"
    ansible.builtin.debug:
      msg: "Hi {{ NAME }}"    
